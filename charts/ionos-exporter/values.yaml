replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/dbildungsplattform/ionos-exporter
  pullPolicy: IfNotPresent

imagePullSecrets: []

ionos:
  secret_name: "ionos-exporter-credentials"
  password:
    enabled: false
    credentials:
      username_key: "username"
      password_key: "password"
  s3:
    enabled: false
    credentials:
      secret_key: "secretKey"
      access_key: "accessKey"
  token:
    enabled: false
    credentials:
      token_key: "tokenKey"
  postgres:
    enabled: false

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: true
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  # Annotations to add to the service account
  annotations: {}

# Security configuration: Do not run as root
podSecurityContext: 
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 2000
securityContext:
  allowPrivilegeEscalation: false

# Application configuration
containerPort: "9100"
ionosApiCycle: "900"

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

